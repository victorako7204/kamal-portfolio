<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal &mdash; Kamal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <nav class="navbar scrolled">
    <div class="nav-inner">
      <a href="/" class="logo">Kamal</a>
      <button class="nav-admin" id="logout-btn" style="display:none">Logout</button>
    </div>
  </nav>

  <!-- Login Gate -->
  <div id="login-gate" class="login-gate">
    <div class="login-card">
      <h1>Portal Access</h1>
      <form id="login-form" class="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary btn-submit">Sign In</button>
        <div id="login-status" class="status-msg"></div>
      </form>
    </div>
  </div>

  <!-- Admin Dashboard (hidden until authenticated) -->
  <main id="admin-panel" class="admin-page" style="display:none">
    <h1>Admin Dashboard</h1>

    <section class="upload-section">
      <h2>Upload New Media</h2>
      <form id="upload-form" class="upload-form">
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" required>
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category" required>
            <option value="">Select category</option>
            <option value="motion">Motion Graphics</option>
            <option value="graphic">Graphic Design</option>
          </select>
        </div>
        <div class="form-group">
          <label for="mediaUrl">Paste Hosted Media URL (e.g., ImgBB direct link, Vimeo URL, or YouTube link)</label>
          <input type="text" id="mediaUrl" name="mediaUrl" placeholder="https://..." required>
        </div>
        <button type="submit" class="btn-primary">Upload</button>
      </form>
      <div id="upload-status" class="status-msg"></div>
    </section>

    <section class="manage-section">
      <h2>Manage Media</h2>
      <div class="table-wrapper">
        <table id="media-table">
          <thead>
            <tr>
              <th>Preview</th>
              <th>Title</th>
              <th>Category</th>
              <th>Type</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="media-tbody"></tbody>
        </table>
      </div>
    </section>

    <section class="inquiries-section">
      <h2>Leads &amp; Inquiries</h2>
      <div class="table-wrapper">
        <table id="inquiries-table">
          <thead>
            <tr>
              <th>Client</th>
              <th>Company</th>
              <th>Email</th>
              <th>Budget</th>
              <th>Timeline</th>
              <th>Brief</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="inquiries-tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/js/admin.js"></script>
</body>
</html>
