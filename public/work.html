<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio &mdash; Kamal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="work-page">

  <nav class="navbar scrolled" id="navbar">
    <div class="nav-inner">
      <a href="/" class="logo">Kamal</a>
      <div class="nav-links">
        <a href="/" class="nav-link">Home</a>
        <a href="/work" class="nav-link">Work</a>
        <a href="/about" class="nav-link">About</a>
        <a href="/contact" class="nav-link">Contact</a>
      </div>
    </div>
  </nav>

  <header class="work-header">
    <h1>Selected Work</h1>
  </header>

  <div class="work-tabs">
    <div class="tabs">
      <button class="tab active" data-tab="motion">Motion Graphics</button>
      <button class="tab" data-tab="graphic">Graphic Design</button>
    </div>
  </div>

  <main class="work-content">
    <div class="tab-content active" id="motion-tab">
      <div class="video-grid" id="motion-grid"></div>
    </div>
    <div class="tab-content" id="graphic-tab">
      <div class="masonry-grid" id="graphic-grid"></div>
    </div>
  </main>

  <footer class="work-footer">
    <p>&copy; 2026 Kamal</p>
  </footer>

  <!-- Video Modal -->
  <div class="modal" id="video-modal">
    <div class="modal-backdrop"></div>
    <button class="modal-close" aria-label="Close">&times;</button>
    <div class="modal-body">
      <video class="modal-video" id="modal-video" controls autoplay></video>
      <div class="modal-info">
        <h3 id="modal-title"></h3>
        <p id="modal-desc"></p>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="modal" id="lightbox">
    <div class="modal-backdrop"></div>
    <button class="modal-close" aria-label="Close">&times;</button>
    <div class="modal-body lightbox-body">
      <img class="lightbox-img" id="lightbox-img" src="" alt="">
      <div class="modal-info">
        <h3 id="lightbox-title"></h3>
        <p id="lightbox-desc"></p>
      </div>
    </div>
  </div>

  <script src="/js/gallery.js"></script>
</body>
</html>
